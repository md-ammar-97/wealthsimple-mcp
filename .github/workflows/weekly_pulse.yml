name: Weekly Pulse

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to commit ledger.json back to the repo

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Create data directories
        run: mkdir -p data/input data/output data/runs outputs

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5

      # Install CPU-only torch to avoid downloading the large CUDA build
      - name: Install torch (CPU)
        run: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      # Fetch fresh reviews — if 0 reviews returned, skip pipeline gracefully
      - name: Fetch reviews
        id: fetch
        run: |
          if pulse fetch --weeks 1 \
              --raw-output data/input/reviews_raw.csv \
              --clean-output data/output/reviews_clean.csv; then
            echo "has_reviews=true" >> $GITHUB_OUTPUT
          else
            echo "has_reviews=false" >> $GITHUB_OUTPUT
            echo "Fetch returned 0 reviews — skipping pipeline this week."
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Run full pipeline: classify → note → email draft → append to doc
      - name: Run pipeline
        if: steps.fetch.outputs.has_reviews == 'true'
        run: pulse run --input data/output/reviews_clean.csv --output-dir outputs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          APPROVAL_MODE: auto

      # Commit updated ledger so the analytics page has persistent history
      - name: Commit ledger update
        if: steps.fetch.outputs.has_reviews == 'true'
        run: |
          git config user.name "pulse-bot"
          git config user.email "pulse-bot@github-actions"
          git add data/runs/ledger.json || true
          git diff --staged --quiet || git commit -m "chore: ledger update [run ${{ github.run_id }}] [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload run artifacts for debugging (ignored if pipeline was skipped)
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-run-${{ github.run_id }}
          path: outputs/
          if-no-files-found: ignore
          retention-days: 30
